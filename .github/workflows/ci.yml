name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ secrets.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ secrets.PUBLIC_POSTHOG_HOST }}
          PUBLIC_BREVO_ACCOUNT_ID: ${{ secrets.PUBLIC_BREVO_ACCOUNT_ID }}
          PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY: ${{ secrets.PUBLIC_CLOUDFLARE_TURNSTILE_SITE_KEY }}
